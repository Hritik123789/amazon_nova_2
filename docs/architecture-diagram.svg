<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background: #0f172a;">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    CityPulse Architecture
  </text>
  <text x="600" y="70" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">
    12 AI Agents • Multi-Modal Intelligence • Real-Time Processing
  </text>
  
  <!-- Phase 1: Data Collection Agents -->
  <rect x="50" y="120" width="500" height="280" rx="15" fill="rgba(99, 102, 241, 0.1)" stroke="url(#primaryGrad)" stroke-width="2"/>
  <text x="300" y="150" font-family="Inter, sans-serif" font-size="20" font-weight="bold" fill="#6366f1" text-anchor="middle">
    Phase 1: Data Collection (6 Agents)
  </text>
  
  <!-- Agent boxes - Phase 1 -->
  <g id="agent1">
    <rect x="70" y="170" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="180" y="195" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">📰 News Synthesis</text>
    <text x="180" y="215" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite • RSS Feeds</text>
  </g>
  
  <g id="agent2">
    <rect x="310" y="170" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="420" y="195" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🤖 Nova Act Automation</text>
    <text x="420" y="215" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova Act • UI Automation</text>
  </g>
  
  <g id="agent3">
    <rect x="70" y="245" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="180" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🏢 Permit Monitor</text>
    <text x="180" y="290" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Selenium • Real-time Scraping</text>
  </g>
  
  <g id="agent4">
    <rect x="310" y="245" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="420" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🏛️ BMC Ward Monitor</text>
    <text x="420" y="290" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova Act • Ward-level Data</text>
  </g>
  
  <g id="agent5">
    <rect x="70" y="320" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="180" y="345" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">👥 Social Listening</text>
    <text x="180" y="365" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite • Reddit Sentiment</text>
  </g>
  
  <g id="agent6">
    <rect x="310" y="320" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="420" y="345" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">📸 Visual Intelligence</text>
    <text x="420" y="365" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Omni • Multimodal</text>
  </g>
  
  <!-- Arrow down to backend -->
  <path d="M 300 410 L 300 450" stroke="url(#primaryGrad)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Backend API -->
  <rect x="200" y="450" width="200" height="80" rx="10" fill="url(#successGrad)"/>
  <text x="300" y="480" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Backend API</text>
  <text x="300" y="505" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Flask • REST API</text>
  <text x="300" y="522" font-family="Inter, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">AWS Bedrock • Render</text>
  
  <!-- Arrow right to Phase 2 -->
  <path d="M 400 490 L 640 490" stroke="url(#primaryGrad)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 2: User Features -->
  <rect x="650" y="120" width="500" height="280" rx="15" fill="rgba(139, 92, 246, 0.1)" stroke="url(#warningGrad)" stroke-width="2"/>
  <text x="900" y="150" font-family="Inter, sans-serif" font-size="20" font-weight="bold" fill="#8b5cf6" text-anchor="middle">
    Phase 2: User Features (6 Agents)
  </text>
  
  <!-- Agent boxes - Phase 2 -->
  <g id="feature1">
    <rect x="670" y="170" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="780" y="195" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">☀️ Morning Briefing</text>
    <text x="780" y="215" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite + Polly</text>
  </g>
  
  <g id="feature2">
    <rect x="910" y="170" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1020" y="195" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🔔 Smart Alerts</text>
    <text x="1020" y="215" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite • Real-time</text>
  </g>
  
  <g id="feature3">
    <rect x="670" y="245" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="780" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🚨 Safety Intelligence</text>
    <text x="780" y="290" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite • Hazard Detection</text>
  </g>
  
  <g id="feature4">
    <rect x="910" y="245" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1020" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">💰 Investment Insights</text>
    <text x="1020" y="290" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite • Analysis</text>
  </g>
  
  <g id="feature5">
    <rect x="670" y="320" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="780" y="345" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">💬 Community Pulse</text>
    <text x="780" y="365" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova 2 Lite • Sentiment</text>
  </g>
  
  <g id="feature6">
    <rect x="910" y="320" width="220" height="60" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="1020" y="345" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🎙️ Voice Q&A</text>
    <text x="1020" y="365" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nova + Polly + RAG</text>
  </g>
  
  <!-- Arrow down to frontend -->
  <path d="M 900 410 L 900 450" stroke="url(#warningGrad)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Frontend -->
  <rect x="800" y="450" width="200" height="80" rx="10" fill="url(#warningGrad)"/>
  <text x="900" y="480" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Frontend</text>
  <text x="900" y="505" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Vanilla JS • Three.js</text>
  <text x="900" y="522" font-family="Inter, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Leaflet Maps • Vercel</text>
  
  <!-- Data Flow Labels -->
  <text x="300" y="435" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#10b981" text-anchor="middle">
    Raw Data
  </text>
  <text x="520" y="475" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" text-anchor="middle">
    Processed Insights
  </text>
  <text x="900" y="435" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">
    User Experience
  </text>
  
  <!-- Key Metrics Box -->
  <rect x="50" y="580" width="1100" height="180" rx="15" fill="rgba(30, 41, 59, 0.5)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="2"/>
  <text x="600" y="615" font-family="Inter, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Key Performance Metrics
  </text>
  
  <!-- Metrics Grid -->
  <g id="metrics">
    <rect x="80" y="640" width="240" height="90" rx="10" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="200" y="670" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#6366f1" text-anchor="middle">12</text>
    <text x="200" y="695" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">AI Agents</text>
    <text x="200" y="715" font-family="Inter, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Working 24/7</text>
    
    <rect x="340" y="640" width="240" height="90" rx="10" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" stroke-width="1.5"/>
    <text x="460" y="670" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#10b981" text-anchor="middle">92%</text>
    <text x="460" y="695" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Accuracy Rate</text>
    <text x="460" y="715" font-family="Inter, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Permit Detection</text>
    
    <rect x="600" y="640" width="240" height="90" rx="10" fill="rgba(245, 158, 11, 0.2)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="720" y="670" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle">&lt;2s</text>
    <text x="720" y="695" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Response Time</text>
    <text x="720" y="715" font-family="Inter, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Voice AI</text>
    
    <rect x="860" y="640" width="240" height="90" rx="10" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="980" y="670" font-family="Inter, sans-serif" font-size="32" font-weight="bold" fill="#8b5cf6" text-anchor="middle">88%</text>
    <text x="980" y="695" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Cost Reduction</text>
    <text x="980" y="715" font-family="Inter, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">vs GPT-4</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6366f1" />
    </marker>
  </defs>
</svg>
